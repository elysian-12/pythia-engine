name: Refresh swarm snapshot

on:
  # Three trigger paths — pick whichever stays reliable for your
  # environment.
  #
  # 1. `schedule` (hourly). Reliable on paper; in practice GitHub
  #    Actions cron is lossy under platform load and runs can be
  #    delayed by hours or skipped entirely. Keep as the baseline,
  #    but don't trust it for time-critical refreshes.
  #
  # 2. `workflow_dispatch`. Manual button on the Actions tab. Ship-it
  #    insurance — fire it before any demo to guarantee a fresh
  #    snapshot.
  #
  # 3. `repository_dispatch`. External-scheduler hook. Any service
  #    that can POST to GitHub's REST API
  #    (https://api.github.com/repos/<owner>/<repo>/dispatches) with
  #    `{"event_type": "refresh-snapshot"}` triggers a run. Use
  #    cron-job.org (free, ~99.9% reliability) or a Vercel Cron Job
  #    when you need actual hourly precision.
  #
  # 4. `push`. Re-bundle on relevant code changes so deploy and
  #    snapshot can't drift.
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-snapshot]
  push:
    branches: [main]
    paths:
      - '.github/workflows/refresh-snapshot.yml'
      - 'crates/swarm/**'
      - 'crates/ingest/**'
      - 'apps/web/scripts/bundle-snapshot.mjs'

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    # Bumped from 12 → 25. The first cold run hits all three slow paths
    # in series: full cargo workspace compile (~6-8 min), 90-day Kiyotaka
    # scrape (~1-2 min), backtest (~30 s). Subsequent runs land at ~2 min
    # because Swatinem/rust-cache restores the build artifacts. 25 min
    # gives the cold path comfortable headroom.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: swarm-backtest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore data dir
        id: data-cache
        uses: actions/cache@v4
        with:
          path: data
          key: pythia-data-v1-${{ github.run_id }}
          restore-keys: |
            pythia-data-v1-
            pythia-data-

      - name: Top up Kiyotaka data
        env:
          KIYOTAKA_API_KEY: ${{ secrets.KIYOTAKA_API_KEY }}
        run: |
          set -e
          if [ -z "$KIYOTAKA_API_KEY" ]; then
            echo "KIYOTAKA_API_KEY secret not set; aborting"
            exit 1
          fi
          DAYS=7
          if [ ! -f data/pythia.duckdb ]; then
            # 90 days on bootstrap (was 365). Still gives ~6,500 hourly
            # events per asset — plenty for the backtest to surface
            # multi-family evolution. 365 days made the first run blow
            # through the 12-min job timeout on a cold runner.
            echo "no cached duckdb; bootstrapping with 90 days"
            DAYS=90
          fi
          cargo run --release -p ingest --bin scrape -- $DAYS 2>&1 | tail -30

      - name: Run swarm-backtest
        env:
          PYTHIA_EVOLVE_EVERY: '750'
          RUST_LOG: 'info,swarm=info'
        run: |
          set -e
          cargo run --release -p swarm --bin swarm-backtest 2>&1 | tail -40

      - name: Re-bundle snapshot for Vercel
        working-directory: apps/web
        run: |
          set -e
          node scripts/bundle-snapshot.mjs

      - name: Prune old reports (TTL keeps last N)
        # Each cron tick writes a fresh `reports/swarm/<unix-ts>/`
        # directory containing swarm.md, swarm.json, and snapshot.json.
        # At hourly cadence that's 720 dirs / month → ~36 MB of git
        # bloat / month if we never prune. Keep the most recent 168
        # (one week of hourly runs) and remove the rest. The bundler
        # only ever reads the latest one, so older dirs are
        # historical record only.
        run: |
          set -e
          mkdir -p reports/swarm
          KEEP=168
          # Portable "drop oldest, keep last KEEP" via awk slicing.
          all=$(ls -1 reports/swarm 2>/dev/null | grep -E '^[0-9]+$' | sort -n)
          total=$(echo "$all" | grep -c . || true)
          drop=$(( total - KEEP ))
          if [ "$drop" -le 0 ]; then
            echo "no old reports to prune (have $total <= $KEEP)"
          else
            to_del=$(echo "$all" | awk -v n="$drop" 'NR<=n')
            echo "pruning $drop report dirs older than the latest $KEEP"
            echo "$to_del" | while read d; do
              [ -n "$d" ] || continue
              git rm -rf "reports/swarm/$d" 2>/dev/null || rm -rf "reports/swarm/$d"
            done
          fi

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name "elysian-12"
          git config user.email "jeremy@trontalgroup.com"
          git add data/swarm-snapshot.json data/swarm-population.json \
                  apps/web/lib/bundled/swarm-snapshot.json \
                  apps/web/public/swarm-snapshot.json \
                  reports/swarm/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no snapshot changes - nothing to commit"
            exit 0
          fi
          GEN=$(jq -r '.generation // "?"' data/swarm-snapshot.json 2>/dev/null || echo "?")
          CH=$(jq -r '.champion.agent_id // "?"' data/swarm-snapshot.json 2>/dev/null || echo "?")
          git commit -m "chore(snapshot): refresh gen ${GEN} (${CH})"
          git pull --rebase origin main || true
          git push origin HEAD:main
